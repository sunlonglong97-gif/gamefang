<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>星际矿工 - 放置类游戏</title>
    <base href="./">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.type = 'text/css';
            link.href = './style.css?' + Date.now();
            link.onload = function() {
                console.log('CSS loaded successfully');
            };
            link.onerror = function() {
                console.error('Failed to load CSS, applying fallback styles');
                applyFallbackStyles();
            };
            document.head.appendChild(link);
        });

        function applyFallbackStyles() {
            var style = document.createElement('style');
            style.textContent = `
                * { margin: 0; padding: 0; box-sizing: border-box; }
                :root {
                    --primary-color: #00ffff;
                    --secondary-color: #ff00ff;
                    --accent-color: #ffd700;
                    --bg-dark: #0a0a1a;
                    --bg-card: rgba(20, 20, 40, 0.8);
                    --border-color: rgba(0, 255, 255, 0.3);
                }
                body {
                    font-family: 'Orbitron', 'Segoe UI', sans-serif;
                    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 30%, #0a0a1a 60%, #1a0a2e 100%);
                    min-height: 100vh;
                    overflow-x: hidden;
                    color: #fff;
                }
                .game-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
                .game-header { text-align: center; margin-bottom: 25px; }
                .game-title {
                    font-size: clamp(1.5rem, 4vw, 2.5rem);
                    background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
                    background-size: 200% auto;
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    animation: gradientText 3s linear infinite;
                }
                @keyframes gradientText { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
                .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
                .header-actions { display: flex; gap: 10px; }
                .btn, .btn-small {
                    padding: 10px 20px;
                    background: rgba(0, 255, 255, 0.1);
                    border: 2px solid #00ffff;
                    color: #00ffff;
                    border-radius: 10px;
                    cursor: pointer;
                    font-family: 'Orbitron', sans-serif;
                    transition: all 0.3s ease;
                }
                .btn:hover, .btn-small:hover {
                    background: rgba(0, 255, 255, 0.3);
                    box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
                }
                .btn-small { padding: 8px 16px; font-size: 0.85rem; }
                .stats-bar { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
                .stat-item {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    background: rgba(20, 20, 40, 0.9);
                    padding: 12px 25px;
                    border-radius: 15px;
                    border: 1px solid rgba(0, 255, 255, 0.3);
                }
                .stat-icon { font-size: 1.5rem; }
                .stat-value {
                    font-size: 1.5rem;
                    font-weight: bold;
                    color: #00ffff;
                }
                .game-nav {
                    display: flex;
                    justify-content: center;
                    gap: 8px;
                    flex-wrap: wrap;
                    padding: 12px;
                    background: rgba(10, 10, 30, 0.6);
                    border-radius: 20px;
                    margin-bottom: 25px;
                }
                .nav-btn {
                    padding: 10px 20px;
                    background: rgba(20, 20, 40, 0.8);
                    border: 2px solid transparent;
                    border-radius: 12px;
                    color: #aaa;
                    cursor: pointer;
                    font-family: 'Orbitron', sans-serif;
                    transition: all 0.3s ease;
                }
                .nav-btn:hover { color: #00ffff; border-color: rgba(0, 255, 255, 0.5); }
                .nav-btn.active {
                    background: rgba(0, 255, 255, 0.2);
                    border-color: #00ffff;
                    color: #00ffff;
                }
                .game-content { min-height: 500px; }
                .panel { display: none; }
                .panel.active { display: block; }
                .panel-title {
                    text-align: center;
                    font-size: 1.5rem;
                    margin-bottom: 20px;
                    background: linear-gradient(90deg, #00ffff, #ff00ff);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                }
                #main-panel { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
                .click-area {
                    width: 400px;
                    height: 400px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    position: relative;
                }
                .planet {
                    width: 280px;
                    height: 280px;
                    border-radius: 50%;
                    background: radial-gradient(circle, #4a3f6b 0%, #2d2544 50%, #1a152e 100%);
                    cursor: pointer;
                    transition: transform 0.15s ease;
                    box-shadow: 0 15px 50px rgba(138, 43, 226, 0.4);
                    animation: float 5s ease-in-out infinite;
                }
                @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
                .planet:hover { transform: scale(1.05); }
                .planet:active { transform: scale(0.95); }
                .planet-core {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    width: 100px;
                    height: 100px;
                    border-radius: 50%;
                    background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
                    box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
                    animation: pulse 2s ease-in-out infinite;
                }
                @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
                .crystal-shard {
                    position: absolute;
                    width: 30px;
                    height: 30px;
                    background: linear-gradient(135deg, #00ffff, #ff00ff);
                    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
                    animation: crystalGlow 3s ease-in-out infinite;
                }
                .c1 { top: 30px; left: 50%; transform: translateX(-50%); }
                .c2 { bottom: 40px; right: 40px; transform: rotate(45deg); }
                .c3 { top: 50%; left: 20px; transform: translateY(-50%) rotate(-45deg); }
                .c4 { bottom: 30px; left: 50%; transform: translateX(-50%) rotate(180deg); }
                @keyframes crystalGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; transform: translateX(-50%) scale(1.2); } }
                .tap-hint {
                    position: absolute;
                    bottom: 15px;
                    left: 50%;
                    transform: translateX(-50%);
                    color: #888;
                    font-size: 0.85rem;
                }
                .side-panel { display: flex; flex-direction: column; gap: 15px; width: 300px; }
                .event-panel, .daily-reward-panel {
                    background: rgba(30, 20, 40, 0.9);
                    border: 2px solid rgba(255, 107, 107, 0.5);
                    border-radius: 15px;
                    padding: 20px;
                }
                .daily-reward-panel { border-color: rgba(255, 215, 0, 0.5); }
                .daily-reward-title {
                    color: #ffd700;
                    font-weight: bold;
                    margin-bottom: 15px;
                    text-align: center;
                }
                .daily-reward-btn {
                    background: rgba(255, 215, 0, 0.3);
                    border: 2px solid #ffd700;
                    color: #ffd700;
                    padding: 10px 25px;
                    border-radius: 10px;
                    font-weight: bold;
                    cursor: pointer;
                    display: block;
                    margin: 0 auto;
                }
                .shop-items { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
                .shop-item {
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    background: rgba(20, 20, 40, 0.9);
                    padding: 15px;
                    border-radius: 12px;
                    border: 1px solid rgba(0, 255, 255, 0.3);
                    cursor: pointer;
                }
                .shop-item.disabled { opacity: 0.5; }
                .item-icon { font-size: 2rem; }
                .item-info { flex: 1; }
                .item-name { color: #fff; font-weight: bold; }
                .item-desc { color: #888; font-size: 0.85rem; }
                .item-price { color: #00ffff; font-weight: bold; }
                .achievements-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                    gap: 15px;
                    max-width: 800px;
                    margin: 0 auto;
                }
                .achievement-card {
                    background: rgba(20, 20, 40, 0.9);
                    border: 2px solid rgba(0, 255, 255, 0.3);
                    border-radius: 15px;
                    padding: 20px;
                    text-align: center;
                }
                .achievement-card.unlocked { border-color: #00ffff; }
                .achievement-card.locked { opacity: 0.5; }
                .achievement-icon { font-size: 3rem; }
                .achievement-name { color: #fff; font-weight: bold; margin: 10px 0; }
                .achievement-desc { color: #888; font-size: 0.85rem; }
                .tech-tree { max-width: 700px; margin: 0 auto; }
                .tech-node {
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    background: rgba(20, 20, 40, 0.9);
                    padding: 18px;
                    border-radius: 15px;
                    margin-bottom: 12px;
                    border: 2px solid #333;
                }
                .tech-node.unlocked { border-color: #00ffff; }
                .tech-node.purchased { border-color: #ffd700; }
                .tech-icon { font-size: 2.2rem; }
                .tech-info { flex: 1; }
                .tech-name { color: #fff; font-weight: bold; }
                .tech-desc { color: #888; font-size: 0.9rem; }
                .tech-price { color: #00ffff; font-weight: bold; }
                .skins-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                    gap: 15px;
                    max-width: 800px;
                    margin: 0 auto;
                }
                .skin-card {
                    background: rgba(20, 20, 40, 0.9);
                    border: 2px solid #333;
                    border-radius: 15px;
                    padding: 20px;
                    text-align: center;
                    cursor: pointer;
                }
                .skin-card.unlocked { border-color: #ffd700; }
                .skin-card.selected { border-color: #00ffff; }
                .skin-preview {
                    width: 100px;
                    height: 100px;
                    border-radius: 50%;
                    margin: 0 auto 12px;
                }
                .skin-name { color: #fff; font-weight: bold; }
                .skin-price { color: #ffd700; }
                .stats-grid { max-width: 600px; margin: 0 auto; }
                .stat-row {
                    display: flex;
                    justify-content: space-between;
                    padding: 12px 20px;
                    background: rgba(20, 20, 40, 0.8);
                    border-radius: 10px;
                    margin-bottom: 8px;
                }
                .stat-label { color: #aaa; }
                .stat-num { color: #00ffff; font-weight: bold; }
                .tasks-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
                .task-tab {
                    padding: 10px 20px;
                    background: rgba(20, 20, 40, 0.8);
                    border: 2px solid transparent;
                    border-radius: 12px;
                    color: #aaa;
                    cursor: pointer;
                }
                .task-tab.active {
                    background: rgba(0, 255, 255, 0.2);
                    border-color: #00ffff;
                    color: #00ffff;
                }
                .tasks-list {
                    display: flex;
                    flex-direction: column;
                    gap: 12px;
                    max-width: 500px;
                    margin: 0 auto;
                }
                .task-card {
                    background: rgba(20, 20, 40, 0.9);
                    border: 2px solid rgba(0, 255, 255, 0.3);
                    border-radius: 12px;
                    padding: 15px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }
                .task-card.completed { border-color: #ffd700; }
                .task-name { color: #fff; font-weight: bold; }
                .task-desc { color: #888; font-size: 0.85rem; }
                .task-reward { color: #ffd700; font-weight: bold; }
                .task-btn {
                    padding: 8px 16px;
                    border-radius: 8px;
                    font-weight: bold;
                    cursor: pointer;
                }
                .task-btn.claim {
                    background: rgba(255, 215, 0, 0.3);
                    border: 2px solid #ffd700;
                    color: #ffd700;
                }
                .task-btn.in-progress {
                    background: rgba(0, 255, 255, 0.1);
                    border: 2px solid #00ffff;
                    color: #00ffff;
                    opacity: 0.7;
                }
                .leaderboard-list { max-width: 500px; margin: 0 auto; }
                .leaderboard-item {
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    background: rgba(20, 20, 40, 0.9);
                    padding: 15px;
                    border-radius: 12px;
                    margin-bottom: 10px;
                    border: 2px solid #333;
                }
                .leaderboard-item.top3 { border-color: #ffd700; }
                .leaderboard-rank {
                    width: 35px;
                    height: 35px;
                    border-radius: 50%;
                    background: #333;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                }
                .leaderboard-item.top3 .leaderboard-rank {
                    background: linear-gradient(135deg, #ffd700, #ff8c00);
                    color: #000;
                }
                .leaderboard-name { flex: 1; color: #fff; font-weight: bold; }
                .leaderboard-score { color: #00ffff; font-weight: bold; }
                .game-footer {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 20px;
                    flex-wrap: wrap;
                    margin-top: 30px;
                    padding: 15px;
                }
                .btn-secondary {
                    background: rgba(200, 50, 50, 0.3);
                    border-color: #ff4444;
                    color: #ff4444;
                }
                .game-time { color: #888; }
                .save-status { color: #888; font-size: 0.9rem; }
                .save-status.saved { color: #00ff00; }
                .modal {
                    display: none;
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.9);
                    justify-content: center;
                    align-items: center;
                    z-index: 100;
                }
                .modal.active { display: flex; }
                .modal-content {
                    background: rgba(25, 25, 50, 0.98);
                    border: 2px solid #00ffff;
                    border-radius: 20px;
                    padding: 30px;
                    text-align: center;
                    max-width: 400px;
                    width: 90%;
                }
                .modal-content h3 { color: #00ffff; margin-bottom: 15px; }
                .modal-content p { color: #aaa; margin-bottom: 10px; }
                textarea {
                    width: 100%;
                    height: 120px;
                    background: rgba(0, 0, 0, 0.5);
                    border: 2px solid rgba(0, 255, 255, 0.3);
                    border-radius: 10px;
                    padding: 10px;
                    color: #fff;
                    font-family: monospace;
                    margin: 15px 0;
                }
                .sale-banner {
                    background: linear-gradient(90deg, #ff4444, #ff8c00);
                    border-radius: 10px;
                    padding: 12px;
                    text-align: center;
                    margin-bottom: 15px;
                }
                .sale-banner span { color: white; font-weight: bold; }
                .achievements-progress {
                    background: rgba(20, 20, 40, 0.8);
                    border-radius: 12px;
                    padding: 12px 15px;
                    margin-bottom: 15px;
                }
                .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
                .progress-bar { height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; overflow: hidden; }
                .progress-fill {
                    height: 100%;
                    background: linear-gradient(90deg, #00ffff, #ff00ff);
                    border-radius: 5px;
                }
                .share-section { text-align: center; margin-bottom: 15px; }
                @media (max-width: 768px) {
                    .click-area { width: 300px; height: 300px; }
                    .planet { width: 220px; height: 220px; }
                    .side-panel { width: 100%; max-width: 300px; }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="header-top">
                <h1 class="game-title">🚀 星际矿工</h1>
                <div class="header-actions">
                    <button class="btn btn-small" id="saveBtn">💾 保存</button>
                    <button class="btn btn-small" id="exportBtn">📤 导出存档</button>
                    <button class="btn btn-small" id="performanceBtn">⚙️ 性能模式</button>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-icon">💎</span>
                    <span class="stat-value" id="crystals">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⚡</span>
                    <span class="stat-value" id="perSecond">0</span>/秒
                </div>
                <div class="stat-item">
                    <span class="stat-icon">👆</span>
                    <span class="stat-value" id="clickPower">1</span>/点击
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎁</span>
                    <span class="stat-value" id="dailyBonus">0</span> 今日奖励
                </div>
            </div>
        </header>

        <nav class="game-nav">
            <button class="nav-btn active" data-panel="main">游戏</button>
            <button class="nav-btn" data-panel="shop">商店</button>
            <button class="nav-btn" data-panel="achievements">成就</button>
            <button class="nav-btn" data-panel="tech">科技</button>
            <button class="nav-btn" data-panel="tasks">任务</button>
            <button class="nav-btn" data-panel="skins">皮肤</button>
            <button class="nav-btn" data-panel="stats">统计</button>
            <button class="nav-btn" data-panel="leaderboard">排行</button>
        </nav>

        <main class="game-content">
            <div class="panel active" id="main-panel">
                <div class="click-area" id="clickArea">
                    <div class="planet" id="planet">
                        <div class="planet-core"></div>
                        <div class="crystal-shard c1"></div>
                        <div class="crystal-shard c2"></div>
                        <div class="crystal-shard c3"></div>
                        <div class="crystal-shard c4"></div>
                    </div>
                    <div class="tap-hint">点击星球收集水晶</div>
                </div>
                <div class="side-panel">
                    <div class="event-panel" id="eventPanel"></div>
                    <div class="daily-reward-panel" id="dailyRewardPanel"></div>
                </div>
            </div>

            <div class="panel" id="shop-panel">
                <h2 class="panel-title">🛒 商店</h2>
                <div class="sale-banner" id="saleBanner"></div>
                <div class="shop-items" id="shopItems"></div>
            </div>

            <div class="panel" id="achievements-panel">
                <h2 class="panel-title">🏆 成就</h2>
                <div class="achievements-progress">
                    <div class="progress-info">
                        <span>成就进度</span>
                        <span id="achievementsProgress">0/17</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="achievementsProgressBar"></div>
                    </div>
                </div>
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>

            <div class="panel" id="tech-panel">
                <h2 class="panel-title">🔬 科技树</h2>
                <div class="tech-tree" id="techTree"></div>
            </div>

            <div class="panel" id="tasks-panel">
                <h2 class="panel-title">📋 任务中心</h2>
                <div class="tasks-tabs">
                    <button class="task-tab active" data-tab="daily">每日任务</button>
                    <button class="task-tab" data-tab="weekly">每周任务</button>
                    <button class="task-tab" data-tab="milestone">里程碑</button>
                </div>
                <div class="tasks-list" id="tasksList"></div>
            </div>

            <div class="panel" id="skins-panel">
                <h2 class="panel-title">🎨 皮肤商店</h2>
                <div class="skins-grid" id="skinsGrid"></div>
            </div>

            <div class="panel" id="stats-panel">
                <h2 class="panel-title">📊 统计数据</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <div class="panel" id="leaderboard-panel">
                <h2 class="panel-title">🏅 排行榜</h2>
                <div class="share-section">
                    <button class="btn" id="shareBtn">📱 分享成绩</button>
                </div>
                <div class="leaderboard-list" id="leaderboardList"></div>
            </div>
        </main>

        <footer class="game-footer">
            <button class="btn btn-secondary" id="resetBtn">重置游戏</button>
            <button class="btn" id="importBtn">📥 导入存档</button>
            <span class="game-time">游戏时长: <span id="playTime">00:00:00</span></span>
            <span class="save-status" id="saveStatus">💾 自动保存中...</span>
        </footer>
    </div>

    <div class="modal" id="offlineModal">
        <div class="modal-content">
            <h3>🌟 欢迎回来！</h3>
            <p>你离线了 <span id="offlineTime">0</span></p>
            <p>获得离线收益: <span id="offlineReward">0</span> 💎</p>
            <button class="btn" id="claimOffline">领取奖励</button>
        </div>
    </div>

    <div class="modal" id="achievementModal">
        <div class="modal-content">
            <div class="achievement-icon" id="modalAchievementIcon"></div>
            <h3 id="modalAchievementName">成就解锁！</h3>
            <p id="modalAchievementDesc"></p>
            <button class="btn" id="closeAchievement">太棒了！</button>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <h3>📤 导出存档</h3>
            <p>复制以下存档数据，可在其他设备恢复进度：</p>
            <textarea id="exportData" readonly></textarea>
            <button class="btn" id="copyExport">复制存档</button>
            <button class="btn btn-secondary" id="closeExport">关闭</button>
        </div>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <h3>📥 导入存档</h3>
            <p>粘贴存档数据以恢复进度：</p>
            <textarea id="importData" placeholder="粘贴存档数据..."></textarea>
            <button class="btn" id="doImport">导入存档</button>
            <button class="btn btn-secondary" id="closeImport">关闭</button>
        </div>
    </div>

    <div class="modal" id="taskRewardModal">
        <div class="modal-content">
            <h3>🎁 任务完成！</h3>
            <p id="taskRewardText"></p>
            <button class="btn" id="claimTaskReward">领取奖励</button>
        </div>
    </div>

    <script type="text/javascript">
    var script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = './game.js?' + Date.now();
    script.onload = function() {
        console.log('Game script loaded successfully');
        if (typeof IdleGame === 'function') {
            window.gameInstance = new IdleGame();
        }
    };
    script.onerror = function() {
        console.error('Failed to load game script');
